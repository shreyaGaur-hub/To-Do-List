<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>To-Do List App - Easy Tutorials</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="todo-app">
                <h2>To-Do List <img src="https://cdn-icons-png.flaticon.com/128/6194/6194029.png"></h2>
                <div class="row">
                    <input type="text" id="input-box" placeholder="Add a new task...">
                    <button onclick="addTask()">Add</button>
                </div>
                <p id="congrats-msg" style="display: none; color: #2ecc71; font-weight: bold; text-align: center; margin-bottom: 20px;">Hurray! You've completed all your Tasks 🎉</p>
                <ul id="list-container">
                    <!--<li class="checked">Task 1</li>
                    <li>Task 2</li>
                    <li>Task 3</li> -->
                </ul>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
